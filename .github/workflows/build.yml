name: Build Windows binaries

# Запускается при пуше тега вида v1.0, v1.1 и т.д.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # нужно чтобы создавать Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build all Windows binaries
        working-directory: cross
        run: |
          # x64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-H windowsgui -s -w" -o LayoutSwitcher-win-x64.exe .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o LayoutSwitcher-win-x64-debug.exe .
          # arm64
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-H windowsgui -s -w" -o LayoutSwitcher-win-arm64.exe .
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o LayoutSwitcher-win-arm64-debug.exe .

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cross/LayoutSwitcher-win-x64.exe
            cross/LayoutSwitcher-win-x64-debug.exe
            cross/LayoutSwitcher-win-arm64.exe
            cross/LayoutSwitcher-win-arm64-debug.exe
          body: |
            Готовые Windows-сборки (собраны автоматически).

            Раскладка `Ctrl+Shift`, скриншот `Ctrl+\`, видео `Ctrl+Shift+\`.

            **Какую качать:**
            - Обычный ПК (Intel/AMD): `x64`
            - VM на Apple Silicon Mac: `arm64`
            - Первый запуск: `-debug` версия (видны логи)
